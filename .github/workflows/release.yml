name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            goos: linux
            goarch: amd64

          - os: ubuntu-24.04
            goos: linux
            goarch: arm64
            apt_packages: gcc-aarch64-linux-gnu
            cc: aarch64-linux-gnu-gcc

          - os: macos-13
            goos: darwin
            goarch: amd64

          - os: macos-latest
            goos: darwin
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install cross-compiler
        if: matrix.apt_packages != ''
        run: sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.cc }}
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="$(git rev-parse --short HEAD)"
          mkdir -p dist
          go build \
            -ldflags "-X main.version=${VERSION} -X main.commit=${COMMIT} -s -w" \
            -o dist/watui \
            ./cmd/watui/

      - name: Package
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE="watui-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
          cd dist
          tar czf "${ARCHIVE}" watui
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: watui-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/watui-*.tar.gz
          if-no-files-found: error

  checksums:
    name: Generate checksums
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: SHA-256 checksums
        run: |
          cd dist
          sha256sum watui-*.tar.gz > checksums.txt
          cat checksums.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: dist/checksums.txt

  release:
    name: Publish GitHub Release
    needs: checksums
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/watui-*.tar.gz
            dist/checksums.txt
          generate_release_notes: true
          fail_on_unmatched_files: true
